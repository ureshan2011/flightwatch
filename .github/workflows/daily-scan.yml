name: daily-scan

on:
  schedule:
    - cron: "0 19 * * *"      # 19:00 UTC daily (~7am NZ standard time). Adjust as you like.
  workflow_dispatch:           # lets you trigger a run manually from the Actions tab

permissions:
  contents: write              # needed to commit the new data + dashboard back to the repo

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Chromium for Playwright
        run: python -m playwright install --with-deps chromium

      - name: Collect fares and build dashboard
        # xvfb-run gives Chromium a virtual display; non-headless is less likely to
        # be soft-blocked by Google than pure headless.
        env:
          FLIGHTWATCH_HEADFUL: "1"
        run: xvfb-run -a python -m flightwatch all

      - name: Upload scrape debug artifacts (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-debug
          path: debug/
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit data and dashboard
        run: |
          git config user.name  "flightwatch-bot"
          git config user.email "actions@github.com"
          git add data/ docs/
          git diff --staged --quiet || git commit -m "Daily scan: $(date -u +%Y-%m-%d)"
          git push
