name: scan

on:
  schedule:
    # Every 6 hours -> 4 intraday slots a day. Rows carry an hourly scan_slot, so
    # these accumulate into an intraday booking curve instead of overwriting.
    # NOTE: scheduled workflows only run on the DEFAULT branch -- this new cadence
    # takes effect once merged there. Tune the frequency to taste (free for public
    # repos); spacing runs >1h apart keeps each in its own slot.
    - cron: "0 */6 * * *"
  push:
    # Auto-run on every merge to main: re-scrape and rebuild the published site so
    # the dashboard refreshes the moment a change lands. `paths-ignore` skips the
    # bot's OWN data/docs commits, so a scan's push can't retrigger itself into a
    # loop -- only real code/config merges kick off a fresh run.
    branches: [main]
    paths-ignore:
      - "data/**"
      - "docs/**"
  workflow_dispatch:           # lets you trigger a run manually from the Actions tab

# Queue overlapping runs instead of letting two jobs push at once.
concurrency:
  group: scan
  cancel-in-progress: false

permissions:
  contents: write              # needed to commit the new data + dashboard back to the repo

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install browsers for Playwright
        # Both engines: scrapes rotate across a real Chromium + Firefox mix.
        run: python -m playwright install --with-deps chromium firefox

      - name: Collect fares and build dashboard
        # xvfb-run gives Chromium a virtual display; non-headless is less likely to
        # be soft-blocked by Google than pure headless.
        env:
          FLIGHTWATCH_HEADFUL: "1"
        run: xvfb-run -a python -m flightwatch all

      - name: Send alerts (no-op unless secrets are set)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
        run: python -m flightwatch alert

      - name: Upload scrape debug artifacts (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-debug
          path: debug/
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit data and dashboard
        run: |
          git config user.name  "flightwatch-bot"
          git config user.email "actions@github.com"
          git add data/ docs/
          git diff --staged --quiet && { echo "no changes"; exit 0; }
          git commit -m "Scan: $(date -u +%Y-%m-%dT%H:%MZ)"
          # Land cleanly even if another slot's run pushed while we scraped.
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
          git push
