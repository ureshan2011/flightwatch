# FlightWatch configuration
# Scan the SAME itineraries on every run so we build booking curves over time.
# Tip: keep this list dense (a handful of date-pairs on a corridor) rather than a
# huge sparse grid -- intraday depth on a few routes beats thin coverage of many.

currency: NZD
market: nz                  # Google Flights region (gl=) -- match the route's country
adults: 1
max_offers_per_search: 50   # store up to this many fares per itinerary per scan (0 = all)

# Spotlight one carrier in the dashboard's command center: its lowest current
# fare, a buy/wait call + forecast for that fare, and its cheapest fares over the
# next ~3 months. On CHC<->CMB, Singapore Airlines always flies the trip in a
# connection with Air New Zealand (CHC->SIN->CMB), so this means "trips operated
# by Singapore Airlines", not 100%-SQ-metal (which the route never has). Set to
# "" / remove to hide the spotlight tile.
featured_airline: Singapore Airlines

# Shared browsers (one per engine: Chromium + Firefox) run all itineraries;
# `concurrency` caps how many scrape at once (one lightweight context each).
# Each context now blocks images/fonts/media/ads (see provider.py), so a page is
# ~80% lighter and a bot finishes far quicker -- which lets us run MORE bots in
# parallel on the same free runner without starving it into timeouts. Each still
# grabs its own rotating fingerprint+engine so Google sees a real Chrome/Firefox
# mix. Bumped 4 -> 6 to push throughput now that each scrape is cheaper.
concurrency: 6
jitter_seconds: 5           # random 0-N s stagger before each scrape (less robotic)

# Rolling 3-month coverage. In ADDITION to the dense fixed itineraries below,
# auto-generate a broad grid of departures across the next ~3 months for each
# route, so the dataset captures the whole booking landscape rather than a handful
# of dates. It's recomputed relative to TODAY every run, so the window always
# rolls forward and stays "the next 3 months". Generated dates that duplicate a
# fixed itinerary are dropped.
auto_generate:
  enabled: true
  horizon_days: 90          # scan departures up to ~3 months out
  min_days_out: 1           # start from tomorrow
  depart_step_days: 1       # EVERY day in the window is a departure date
  # Trip duration swept as a range: every length from 20 to 40 days inclusive.
  # These are the BLOCK DEFAULTS; any route below can override any of them
  # (depart_step_days / horizon_days / min_days_out / trip_length_*) so a dense
  # corridor and a lighter one can share one grid without blowing the CI budget.
  trip_length_min: 20
  trip_length_max: 40
  trip_length_step: 1
  routes:
    # Christchurch <-> Colombo: the core corridor -- EVERY day, full 20-40 sweep.
    - {origin: CHC, destination: CMB}
    # Auckland <-> Colombo: NZ's main hub to Colombo. Lighter cadence (every 4
    # days) keeps the added grid affordable while still painting the curve.
    - {origin: AKL, destination: CMB, depart_step_days: 4}
    # NZ <-> India popular routes (Auckland to Delhi & Mumbai). Sparse sweep
    # (every 2 weeks) -- enough to map the booking landscape, cheap on CI.
    - {origin: AKL, destination: DEL, depart_step_days: 14}
    - {origin: AKL, destination: BOM, depart_step_days: 14}
  # Every-day x (20..40)-day sweep is ~1,900 itineraries -- far too many for one
  # run. So the GENERATED grid is sharded across the day's scan slots: each
  # 6-hourly run scrapes one shard (~1/4), and across the day every date/length
  # is covered exactly once. The dense fixed `itineraries:` above are NOT sharded
  # -- they're scanned every run for tight intraday curves. Set shards = number
  # of daily cron slots (cron is every 6h -> 4 slots).
  shard_across_slots: true
  shards: 4

# Cadence is set by the workflow cron (currently every 6h -> 4 intraday slots a
# day). Rows are stamped with an hourly scan_slot, so slots accumulate instead of
# overwriting -- that is what makes intraday volatility visible.

itineraries:
  # Christchurch <-> Colombo, dense around the cheap September/October windows.
  - {origin: CHC, destination: CMB, depart_date: 2026-08-27, return_date: 2026-09-17}
  - {origin: CHC, destination: CMB, depart_date: 2026-09-01, return_date: 2026-09-22}
  - {origin: CHC, destination: CMB, depart_date: 2026-09-03, return_date: 2026-09-24}
  - {origin: CHC, destination: CMB, depart_date: 2026-09-05, return_date: 2026-09-26}
  - {origin: CHC, destination: CMB, depart_date: 2026-09-08, return_date: 2026-10-15}
  - {origin: CHC, destination: CMB, depart_date: 2026-09-10, return_date: 2026-10-01}
  - {origin: CHC, destination: CMB, depart_date: 2026-09-15, return_date: 2026-10-24}
  - {origin: CHC, destination: CMB, depart_date: 2026-09-22, return_date: 2026-10-13}
  # Auckland <-> Colombo, dense around the same cheap Sep/Oct windows.
  - {origin: AKL, destination: CMB, depart_date: 2026-09-01, return_date: 2026-09-22}
  - {origin: AKL, destination: CMB, depart_date: 2026-09-08, return_date: 2026-09-29}
  - {origin: AKL, destination: CMB, depart_date: 2026-09-15, return_date: 2026-10-06}
  # New Zealand <-> India popular routes (Auckland to Delhi & Mumbai), a couple of
  # dense date-pairs each to build tight intraday curves alongside the sweep.
  - {origin: AKL, destination: DEL, depart_date: 2026-09-05, return_date: 2026-09-26}
  - {origin: AKL, destination: DEL, depart_date: 2026-10-03, return_date: 2026-10-24}
  - {origin: AKL, destination: BOM, depart_date: 2026-09-05, return_date: 2026-09-26}
  - {origin: AKL, destination: BOM, depart_date: 2026-10-03, return_date: 2026-10-24}
